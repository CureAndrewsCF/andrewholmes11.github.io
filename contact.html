<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Andrew Holmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">A_HOLMES//></div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 600px;">
        <section>
            <h1><span class="accent-text">[03]</span> Secure Communications</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Want to collaborate on a project or discussing internship opportunities? Drop me an encrypted message line below.</p>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name / Organization</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Return Email Connection</label>
                    <input type="email" id="email" name="email" required placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label for="message">Message Payload</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%; cursor: pointer;">Transmit Message</button>
            </form>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Andrew Holmes | Richland, WA</p>
    </footer>

</body>
</html>
